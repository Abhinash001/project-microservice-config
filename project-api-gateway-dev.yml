server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: product-service
              uri: lb://PROJECT-PRODUCT-SERVICE
              predicates:
                - Path=/products/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 1
                    redis-rate-limiter.burstCapacity: 1
                    key-resolver: "#{@userKeyResolver}"

            - id: cart-service
              uri: lb://PROJECT-CART-SERVICE
              predicates:
                - Path=/cart/**

            - id: order-service
              uri: lb://PROJECT-ORDER-SERVICE
              predicates:
                - Path=/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
