server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/microservices_db
    username: root
    password: Abhinash@1234

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
        instance:
    prefer-ip-address: true
    hostname: localhost

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
