server:
  port: 9090

spring:
  cloud:
    gateway:
      routes:

        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/**

        - id: order-service
          uri: lb://PROJECT-ORDER-SERVICE
          predicates:
            - Path=/orders/**

        - id: cart-service
          uri: lb://PROJECT-CART-SERVICE
          predicates:
            - Path=/cart/**

        - id: payment-service
          uri: lb://PROJECT-PAYMENT-SERVICE
          predicates:
            - Path=/payment/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
