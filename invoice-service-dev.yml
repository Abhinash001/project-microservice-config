server:
  port: 8086

spring:
  application:
    name: invoice-service

  datasource:
    url: jdbc:mysql://localhost:3306/microservices_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
